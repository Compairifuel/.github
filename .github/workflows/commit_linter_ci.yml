name: Conventional Commit Linter CI

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
  workflow_dispatch:

jobs:
  commit_linter:
    name: Commit Linter
    uses: compairifuel/.github/.github/workflows/reusable-commitlinter.yml@V1.1.0-2
    with:
      trunk-ref: main
    permissions:
      contents: read